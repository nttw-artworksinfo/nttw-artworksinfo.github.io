<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTTW.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="N.png">
    
    <style>
        :root {
            --primary-glow: #ff006f;
            --commission-color: #47cbff; /* สีฟ้าสว่างตามดีไซน์เดิม */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://pbs.twimg.com/profile_banners/1731258671882293249/1768844785/1500x500');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary-glow);
            margin-bottom: 1rem;
            object-fit: cover;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 0.2rem;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .bio {
            color: #ddd;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            font-weight: 300;
        }

        /* ปุ่มหลักปุ่มเดียว เปลี่ยนข้อจำเป็นและลิงก์ไปหน้าผลงาน */
        .commission-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--commission-color);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            margin-bottom: 2rem;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(71, 203, 255, 0.4);
            border: 2px solid transparent;
        }

        .commission-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--commission-color);
            border: 2px solid white;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 14px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .link-card i {
            font-size: 1.2rem;
            width: 30px;
            text-align: center;
            margin-right: 15px;
        }

        .link-card span {
            font-weight: 500;
            font-size: 1rem;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary-glow);
            transform: translateX(5px);
            box-shadow: -5px 0 15px var(--primary-glow);
        }

        .fa-x-twitter { color: #fff; }
        .fa-patreon { color: #ff424d; }
    </style>
</head>
<body>

    <div class="container">
        <img src="Prof.png" alt="Profile" class="profile-img">
        <h1>NTTW.</h1>
        <p class="bio">Digital Art | Student Artist | <br> Commission > Gmail: gamechi2099@gmail.com <br> Or other channels.</p>

        <a href="Portfolio.html" class="commission-btn">
            <i class="fas fa-images"></i> Portfolio
        </a>

        <div class="links-container">
            <a href="https://www.facebook.com/profile.php?id=61591083304833" class="link-card" target="_blank">
                <i class="fa-brands fa-facebook" style="color: #1877F2;"></i> <span>Facebook</span>
            </a>
            <a href="https://x.com/nttwac42" class="link-card" target="_blank">
                <i class="fa-brands fa-x-twitter"></i> <span>𝕏 (Twitter)</span>
            </a>
            <a href="https://www.pixiv.net/en/users/83907944" class="link-card" target="_blank">
                <i class="fa-solid fa-palette"></i> <span>Pixiv</span>
            </a>
            <a href="https://www.patreon.com/c/Nttw" class="link-card" target="_blank">
                <i class="fa-brands fa-patreon"></i> <span>Patreon</span>
            </a>
        </div>
    </div>
</body>
</html>
