<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Info — Rates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="N.png">
    <style>
        :root { --bg-dark: #000000; --text-main: #f5f5f7; --text-sub: #86868b; --border-color: #2d2d2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0a0a0c; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Kanit', sans-serif; padding: 20px; }
        .slide-canvas { width: 100%; max-width: 1024px; aspect-ratio: 16 / 9; background-color: var(--bg-dark); color: var(--text-main); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 80px; box-shadow: 0 30px 100px rgba(0,0,0,0.8); border: 1px solid var(--border-color); border-radius: 16px; }
        .slide-header { display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 1.5rem; font-weight: 400; }
        .quick-nav a { text-decoration: none; color: var(--text-sub); font-size: 0.9rem; margin-left: 20px; }
        
        /* Rates Grid */
        .rates-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 40px; margin-bottom: auto; }
        
        /* สไตล์และการทำอนิเมชั่นขยับขึ้นเมื่อเอาเมาส์ชี้ หรือเมื่อกดแท็บบนมือถือ (ข้อ 2) */
        .rate-card { background: #121212; border: 1px solid var(--border-color); border-radius: 12px; padding: 24px 16px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; height: 260px; cursor: pointer; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.4s ease, box-shadow 0.4s ease; }
        .rate-card:hover, .rate-card:active { transform: translateY(-12px); border-color: #0066cc; box-shadow: 0 10px 20px rgba(0, 102, 204, 0.2); }
        .card-img { width: 100%; height: 110px; background: #000; border-radius: 6px; object-fit: cover; margin-bottom: 12px; }
        .card-name { font-size: 1rem; color: var(--text-sub); }
        .card-price { font-size: 1.4rem; font-weight: 500; color: var(--text-main); margin-top: 4px; }
        
        .slide-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .footer-info { font-size: 0.8rem; color: var(--text-sub); }
        .nav-controls { display: flex; align-items: center; gap: 24px; }
        .nav-btn { color: var(--text-sub); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .nav-btn:hover { color: var(--text-main); }
        .slide-counter { color: var(--text-sub); font-size: 0.9rem; font-weight: 300; }

        @media (max-width: 768px) {
            .slide-canvas { aspect-ratio: auto; min-height: 85vh; padding: 40px 24px; }
            .rates-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
            .rate-card { height: 210px; padding: 14px 10px; }
            .card-img { height: 80px; }
            .card-price { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="slide-canvas">
        <div class="slide-header">
            <div class="section-title">Service Rates.</div>
            <div class="quick-nav">
                <a href="index.html">Home</a>
                <a href="Portfolio.html">Portfolio</a>
            </div>
        </div>

        <!-- เพิ่มความสามารถให้ออกแอคชันดีบนมือถือด้วย ontouchstart -->
        <div class="rates-grid">
            <div class="rate-card" ontouchstart="">
                <img src="Ljade00.png" class="card-img" alt="Bust-up">
                <div>
                    <p class="card-name">Bust-up</p>
                    <p class="card-price">350 THB</p>
                </div>
            </div>
            <div class="rate-card" ontouchstart="">
                <img src="TheDahlia00.png" class="card-img" alt="Half-body">
                <div>
                    <p class="card-name">Half-body</p>
                    <p class="card-price">600 THB</p>
                </div>
            </div>
            <div class="rate-card" ontouchstart="">
                <img src="Herta10.png" class="card-img" alt="Full-body">
                <div>
                    <p class="card-name">Full-body</p>
                    <p class="card-price">950 THB</p>
                </div>
            </div>
            <div class="rate-card" ontouchstart="">
                <img src="Aemeath.png" class="card-img" alt="NSFW">
                <div>
                    <p class="card-name">NSFW (18+)</p>
                    <p class="card-price">1,200+ THB</p>
                </div>
            </div>
        </div>

        <div class="slide-footer">
            <span class="footer-info">* Commercial use: x2 of base price</span>
            <div class="nav-controls">
                <a href="CommissionInfo.html" class="nav-btn"><i class="fas fa-chevron-left"></i> Back</a>
                <span class="slide-counter">02 / 05</span>
                <a href="Commission_Slide3.html" class="nav-btn">Next <i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
