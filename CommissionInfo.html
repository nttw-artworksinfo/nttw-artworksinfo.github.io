<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Info — Cover</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #000000; --text-main: #f5f5f7; --text-sub: #86868b; --border-color: #2d2d2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0a0a0c; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Kanit', sans-serif; -webkit-font-smoothing: antialiased; padding: 20px; }
        
        /* สไตล์โครงสร้าง Responsive Canvas (ใช้ร่วมกันทุกหน้า) */
        .slide-canvas { width: 100%; max-width: 1024px; aspect-ratio: 16 / 9; background-color: var(--bg-dark); color: var(--text-main); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 80px; box-shadow: 0 30px 100px rgba(0,0,0,0.8); border: 1px solid var(--border-color); border-radius: 16px; }
        .artwork-bg { position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: linear-gradient(to right, #000000 15%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.15) 100%), url('AstraYao2.png'); background-size: cover; background-position: center; opacity: 0.85; }
        .slide-header { z-index: 2; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo { font-size: 1.5rem; font-weight: 500; }
        .quick-nav a { text-decoration: none; color: var(--text-sub); font-size: 0.9rem; margin-left: 20px; transition: 0.3s; }
        .quick-nav a:hover { color: var(--text-main); }
        .slide-body { z-index: 2; margin-bottom: auto; margin-top: 60px; }
        h2 { font-size: 4rem; font-weight: 500; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 20px; background: linear-gradient(180deg, #ffffff 40%, #a1a1a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-caption { font-size: 1.2rem; color: var(--text-sub); font-weight: 200; }
        .slide-footer { z-index: 2; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .footer-info { font-size: 0.8rem; color: var(--text-sub); letter-spacing: 1px; }
        .nav-controls { display: flex; align-items: center; gap: 24px; }
        .nav-btn { color: var(--text-sub); text-decoration: none; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-btn:hover { color: var(--text-main); }
        .nav-btn.disabled { color: #2d2d2f; pointer-events: none; }
        .slide-counter { color: var(--text-sub); font-size: 0.9rem; font-weight: 300; }

        /* ปรับแต่งหน้าจอมือถือ (Responsive) */
        @media (max-width: 768px) {
            .slide-canvas { aspect-ratio: auto; min-height: 85vh; padding: 40px 30px; }
            .artwork-bg { width: 100%; height: 40%; top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, #000000 90%), url('AstraYao2.png'); background-size: cover; }
            .slide-body { margin-top: 140px; }
            h2 { font-size: 2.5rem; }
            .sub-caption { font-size: 1rem; }
            .footer-info { display: none; } /* ซ่อนข้อความยาวๆ ในมือถือ */
        }
    </style>
</head>
<body>

    <div class="slide-canvas">
        <div class="artwork-bg"></div>
        <div class="slide-header">
            <div class="brand-logo">NTTW.</div>
            <div class="quick-nav">
                <a href="index.html">Home</a>
                <a href="Portfolio.html">Portfolio</a>
            </div>
        </div>
        <div class="slide-body">
            <h2>Commission<br>Information.</h2>
            <p class="sub-caption">Digital Art Illustration & Rates — 2026</p>
        </div>
        <div class="slide-footer">
            <span class="footer-info">Inquiry & Order via Direct Message</span>
            <div class="nav-controls">
                <a href="#" class="nav-btn disabled"><i class="fas fa-chevron-left"></i></a>
                <span class="slide-counter">01 / 05</span>
                <a href="Commission_Slide2.html" class="nav-btn">Next <i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
